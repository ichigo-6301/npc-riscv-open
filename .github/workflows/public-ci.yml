name: public-profile-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  profile:
    name: ${{ matrix.profile }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        profile:
          - rv32im_single_perf
          - rv32ima_sv32_linux
          - rv32im_ooo_4k
    steps:
      - name: Checkout exact public commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install public host tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes g++ make python3-yaml verilator
          verilator --version

      - name: Runtime control-plane tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Verify exported file hashes
        run: sha256sum --check SHA256SUMS

      - name: Select profile
        run: make "${{ matrix.profile }}_defconfig"

      - name: Validate configuration and source closure
        run: |
          make showconfig
          make config-check
          make source-check
          make public-hygiene

      - name: Verilator lint
        run: make verilator-lint

      - name: Bounded simulation smoke
        run: make smoke

      - name: Profile regression
        run: make regression

      - name: Require a clean clone after ignored build output
        run: |
          # Locked upstream RTL is byte-preserved and may carry inherited
          # whitespace; SHA256SUMS is the integrity gate for that source set.
          # Formatting checks apply to the public control plane.
          git diff --check -- . ':(exclude)rtl/profiles/**'
          test -z "$(git status --porcelain --untracked-files=all)"
