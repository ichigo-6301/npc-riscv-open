kind: design_config
schema_version: 1.0.0
design_id: rv32ima_sv32_linux
parameters:
  isa: RV32IMA
  abi: ilp32
  privilege_modes: [M, S]
  architectural_registers: 32
  execution: in_order
  pipeline_stages: 5
  issue_width: 1
  commit_width: 1
  branch_prediction: enabled
  m_extension: true
  a_extension: true
  sv32: true
  itlb_entries: 16
  dtlb_entries: 16
  store_buffer_entries: 2
  fast_mul_latency_cycles: 2
  native_top_module: cpu_top
  simulation_memory_binding: dpi_behavioral
  performance_counters: compile_time_optional
  source_rtl_count: 42
compatibility:
  opensbi_dependency: external
  linux_image_dependency: external
  full_linux_boot_release_gate: false
  board_io_removed_by_public_wrapper: true
