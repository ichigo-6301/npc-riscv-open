kind: implementation_plan
schema_version: 1.0.0
plan_id: npc_open_delivery_implementation
items:
  - id: d0_delivery_inventory
    feature: D0 delivery inventory and policy overlay
    requirement: Lock three source refs, explicit source allowlists, independent configs, conservative claims, and public release policy
    testcase: Manifest audit and source-path validation
    checker: digital-ic-delivery audit plus repository scripts
    coverage: all D0 metadata
    evidence: [public_source_allowlist]
    status: verified
  - id: d1_public_control_plane
    feature: D1 public Kconfig, defconfig, Make, and flow-control plane
    requirement: Select one immutable architecture profile and permit only public-safe runtime overrides
    testcase: showconfig, config-check, and sim-dry-run for all profiles
    checker: flowctl
    coverage: three profiles
    evidence: [public_bounded_validation]
    status: verified
  - id: d2_headless_runtime
    feature: D2 public wrapper and pure-Verilator runtime
    requirement: Remove NVBoard and private debugger dependencies while preserving profile-visible architectural behavior
    testcase: Lint, build, smoke, optional difftest, and trace identity
    checker: Verilator and regression scripts
    coverage: three profiles
    evidence: [public_bounded_validation]
    status: verified
  - id: d3_public_release_gate
    feature: D3 public repository validation
    requirement: Export through allowlists, scan, fresh-clone, run the CI matrix, verify checksums, and leave the clone clean
    testcase: public-hygiene and fresh-clone validation
    checker: release gate
    coverage: npc-riscv-open-v0.1.0-rc1
    evidence: [public_source_allowlist, public_bounded_validation]
    status: partial
  - id: post_migration_asic_baseline
    feature: Profile-specific ASIC PPA and timing baselines
    requirement: Start only after D3; keep technology, memory binding, source ref, and evidence isolated by profile
    testcase: Separate authorized synthesis and implementation runs
    checker: Tool-native reports and same-run handoff checks
    coverage: null
    evidence: []
    status: planned
