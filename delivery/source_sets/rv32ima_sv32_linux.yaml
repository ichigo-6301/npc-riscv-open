compatibility_notes:
  - The exact per-file source, destination, Git blob, byte count, and SHA256 records live only in the canonical JSON allowlist.
  - OpenSBI, Linux, NEMU, AM, DTB, and KVM payloads are external dependencies and are never source-exported by this set.
  - The native board top is excluded; the public wrapper provides only the headless CPU boundary. Bounded OpenSBI, interrupt, MMIO, and Sv32 validation remain separate release gates.
