kind: release_policy
schema_version: 1.0.0
bundle_types: [engineering, review, public-ip]
forbidden_extensions:
  - .lib
  - .db
  - .lef
  - .gds
  - .oas
  - .ndm
  - .ddc
  - .spef
  - .sdf
  - .bit
  - .elf
  - .bin
  - .so
  - .a
  - .vcd
  - .fst
  - .fsdb
  - .wlf
  - .key
  - .pem
  - .lic
forbidden_directories:
  - build
  - obj_dir
  - .Xil
  - work
  - __pycache__
  - flows/local
  - pdk
  - tool_cache
  - nvboard
max_file_bytes: 10485760
max_bundle_bytes: 104857600
require_clean_worktree_for_engineering: true
public_release:
  repository_name: npc-riscv-open
  release_identity: npc-riscv-open-v0.1.0-rc1
  long_lived_branch: main
  default_profile: rv32im_ooo_4k
  profiles: [rv32im_single_perf, rv32ima_sv32_linux, rv32im_ooo_4k]
  license_spdx: MIT
  license_scope: Project-owned exported sources and public delivery assets only
  public_asset_root: .
  canonical_source_allowlist: provenance/source_allowlist.json
  source_set_manifests:
    - source_sets/rv32im_single_perf.yaml
    - source_sets/rv32ima_sv32_linux.yaml
    - source_sets/rv32im_ooo_4k.yaml
  public_claim_ids: []
  public_evidence_ids: []
  public_nonclaim_ids:
    - single_public_cpi_not_yet_claimed
    - single_700mhz_closure_not_claimed
    - single_physical_signoff_not_claimed
    - single_register_expanded_500mhz_not_claimed
    - linux_public_cpi_not_yet_claimed
    - linux_full_boot_not_claimed
    - linux_later_cpi_not_claimed
    - linux_synthesis_not_claimed
    - ooo_public_cpi_not_yet_claimed
    - ooo_universal_cpi_not_claimed
    - ooo_ppa_timing_not_claimed
    - ooo_dpi_synth_equivalence_not_claimed
gates:
  allowlist_only_export: required
  source_blob_and_sha256_verification: required
  profile_filelist_isolation: required
  nvboard_dependency_scan: required
  absolute_path_scan: required
  secret_scan: required
  third_party_license_scan: required
  source_closure: required
  three_profile_ci_matrix: required
  private_public_trace_identity: required
  native_linux_fresh_clone: required
  post_smoke_git_clean: required
claim_promotion:
  require_public_runtime_reproduction: true
  require_exact_source_commit: true
  require_binary_and_config_hashes: true
  require_profile_specific_evidence: true
  prohibit_cross_profile_metric_merge: true
  prohibit_provisional_public_claims: true
synchronization:
  development_repository: private
  public_repository_rtl_development: prohibited
  update_method: reviewed_deterministic_export
  source_ref_update_requires_private_validation: true
